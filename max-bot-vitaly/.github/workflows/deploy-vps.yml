# CD: деплой на VPS по push в main или вручную (workflow_dispatch)
# Секреты в Settings → Secrets and variables → Actions:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY
# При необходимости замените путь ниже на свой (или добавьте секрет VPS_PATH).

name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/max-bot/vitaly1/max-bot-vitaly || cd /root/vitaly1/max-bot-vitaly
            git pull
            source venv/bin/activate && pip install -q -r requirements.txt
            sudo systemctl restart max-bot
            sudo systemctl status max-bot --no-pager
        continue-on-error: true
